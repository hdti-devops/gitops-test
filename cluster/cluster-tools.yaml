---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-tools
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/hdti-devops/gitops-test.git
    targetRevision: HEAD
    path: charts/argocd
    helm:
      valueFiles:
        - values.yaml
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground