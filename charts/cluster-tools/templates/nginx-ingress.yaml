---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-ingress
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-ingress
  source:
    repoURL: https://github.com/hdti-devops/gitops-test.git
    targetRevision: HEAD
    path: charts/nginx-ingress/overlays/dev0-cluster
    kustomize: {}
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true